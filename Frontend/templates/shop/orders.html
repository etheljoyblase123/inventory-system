{% extends "shop/base.html" %}

{% block title %}Nebula | Order History{% endblock %}

{% block content %}
<div class="shop-header" style="margin-bottom: 3rem;">
    <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Recent Orders</h1>
    <p style="color: var(--text-secondary);">Track and manage your recent purchases.</p>
</div>

<div class="orders-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
    <!-- Mock Order Card -->
    <div class="product-card" style="padding: 2rem; flex-direction: row; align-items: center; justify-content: space-between;">
        <div style="display: flex; gap: 2rem; align-items: center;">
            <div style="background: rgba(0,0,0,0.05); width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary);">
                <i data-lucide="package" size="28"></i>
            </div>
            <div>
                <h3 style="font-size: 1rem; margin-bottom: 0.25rem;">Order #NB-98421</h3>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">Placed on April 05, 2024</p>
            </div>
        </div>
        
        <div style="display: flex; gap: 4rem; align-items: center;">
            <div style="text-align: right;">
                <span class="stock-badge in-stock" style="margin-bottom: 0.25rem; display: inline-block; border: none;">Shipped</span>
                <p style="font-size: 0.85rem; color: var(--text-secondary);">Arriving by April 12</p>
            </div>
            <div style="font-weight: 800; font-size: 1.1rem;">$349.00</div>
            <button class="btn btn-outline" style="width: auto; padding: 0.5rem 1.5rem;">Details</button>
        </div>
    </div>
    
    <!-- No more orders message -->
    <div style="text-align: center; padding: 4rem; color: var(--text-dim); font-size: 0.9rem;">
        Showing orders from the last 6 months
    </div>
</div>
{% endblock %}
