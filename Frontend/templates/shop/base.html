<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nebula | Premium E-Commerce{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/shop_ui.css') }}">
    {% block head %}{% endblock %}
</head>

<body>

    <nav class="navbar">
        <a href="/shop" class="nav-brand">WELCOME OUR DEAREST CUSTOMER</a>

        <div class="nav-links">
            <a href="/shop" class="nav-link {{ 'active' if request.path == '/shop' }}">Home</a>
            <a href="/shop/cart" class="nav-link {{ 'active' if request.path == '/shop/cart' }}">Cart</a>
            <a href="/shop/orders" class="nav-link {{ 'active' if request.path == '/shop/orders' }}">Orders</a>
            <a href="/shop/others/profile" class="nav-link {{ 'active' if '/shop/others' in request.path }}">Others</a>
        </div>

        <div class="nav-actions">
            <!-- Search Form -->
            <form action="/shop" method="GET" class="search-form" style="display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 4px 12px;">
                <i data-lucide="search" size="18" style="color: var(--text-dim); margin-right: 8px;"></i>
                <input type="text" name="search" placeholder="Search products..." value="{{ search_query if search_query else '' }}" style="background: transparent; border: none; outline: none; font-size: 0.9rem; width: 140px; padding: 4px 0;">
            </form>

            <!-- Cart Badge -->
            <a href="/shop/cart" style="text-decoration: none; color: inherit; position: relative; display: flex; align-items: center;">
                <i data-lucide="shopping-bag" size="22"></i>
                <span class="badge"
                    style="position: absolute; top: -8px; right: -10px; background: var(--primary-blue); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700;">0</span>
            </a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Cart Modal -->
    <div id="cart-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add to Cart</h2>
                <button class="close-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <p>You are adding <strong id="modal-product-name">Product Name</strong> to your shopping bag.</p>
                <input type="hidden" id="modal-product-id">

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="modal-product-qty" value="1" min="1" class="form-input">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="confirmAddToCart()" style="flex: 1;">Confirm</button>
                    <button class="btn btn-outline btn-cancel" style="flex: 1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/shop.js') }}"></script>
    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
