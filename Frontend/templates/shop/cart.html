{% extends "shop/base.html" %}

{% block title %}Nebula | Your Shopping Bag{% endblock %}

{% block content %}
<div class="shop-header" style="margin-bottom: 3rem; text-align: center;">
    <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem;">Shopping Bag</h1>
    <p style="color: var(--text-secondary);">Review your items before checkout.</p>
</div>

<div class="glass" style="max-width: 800px; margin: 0 auto; padding: 4rem; text-align: center; border-radius: 32px; border: 1px dashed var(--border-color); background: transparent;">
    <div style="background: rgba(59, 130, 246, 0.1); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; color: var(--primary-blue);">
        <i data-lucide="shopping-bag" size="40"></i>
    </div>
    <h2 style="margin-bottom: 1rem;">Your bag is empty</h2>
    <p style="color: var(--text-secondary); margin-bottom: 2.5rem; max-width: 400px; margin-left: auto; margin-right: auto;">Looks like you haven't added anything to your bag yet. Start exploring our premium collection.</p>
    <a href="/shop" class="btn btn-primary" style="display: inline-block; width: auto; padding-left: 3rem; padding-right: 3rem;">Shop Now</a>
</div>
{% endblock %}
