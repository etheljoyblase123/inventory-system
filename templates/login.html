<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Premium Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            overflow: hidden;
        }
        .login-card {
            width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-header { margin-bottom: 32px; }
        .logo-icon { width: 48px; height: 48px; font-size: 24px; margin: 0 auto 16px; }
        .login-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .btn-full { width: 100%; padding: 14px; margin-top: 10px; }
        .auth-footer { margin-top: 24px; font-size: 0.9rem; color: var(--text-dim); }
        .auth-footer a { color: var(--primary-blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-card glass">
        <div class="login-header">
            <div class="logo-icon blue-gradient">A</div>
            <h1>Welcome Back</h1>
            <p class="sub-text">Please enter your details to sign in</p>
        </div>
        <form class="login-form" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@company.com" class="glass-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" class="glass-input" required>
            </div>
            <button type="submit" class="btn-submit btn-full blue-gradient">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/register">Create one</a>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
