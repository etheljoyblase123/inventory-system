<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Premium Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top left, #1e293b, #0f172a); overflow: hidden; }
        .register-card { width: 450px; padding: 40px; text-align: center; }
        .logo-icon { width: 48px; height: 48px; font-size: 24px; margin: 0 auto 16px; }
        .register-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .btn-full { width: 100%; padding: 14px; margin-top: 10px; }
        .auth-footer { margin-top: 24px; font-size: 0.9rem; color: var(--text-dim); }
        .auth-footer a { color: var(--primary-blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card glass">
        <div class="logo-icon purple-gradient">A</div>
        <h1>Create Account</h1>
        <p class="sub-text">Join the premium admin panel network</p>
        <form class="register-form" method="POST">
            <div class="form-group"><label>Full Name</label><input type="text" name="name" placeholder="John Doe" class="glass-input" required></div>
            <div class="form-group"><label>Email Address</label><input type="email" name="email" placeholder="john@example.com" class="glass-input" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="••••••••" class="glass-input" required></div>
            <div class="form-group">
                <label>Join as</label>
                <select name="role" class="glass-select" required>
                    <option value="Admin">Administrator</option>
                    <option value="Buyer">Store Buyer</option>
                </select>
            </div>
            <button type="submit" class="btn-submit btn-full purple-gradient">Create Account</button>
        </form>
        <div class="auth-footer">Already have an account? <a href="/login">Sign in</a></div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
